<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Skills Seekers Resource Hub</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #050505;
            color: #e5e7eb;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 85% 50%, rgba(168, 85, 247, 0.10) 0%, transparent 100%),
                radial-gradient(ellipse 50% 40% at 15% 20%, rgba(99, 102, 241, 0.07) 0%, transparent 100%);
            pointer-events: none;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 880px;
            background: rgba(10, 10, 14, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 0 100px rgba(168, 85, 247, 0.12), 0 40px 80px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
        }

        .brand {
            width: 42%;
            padding: 60px 44px;
            background: linear-gradient(160deg, rgba(18, 18, 28, 0.7) 0%, rgba(6, 6, 12, 0.95) 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .brand-logo {
            width: 86px;
            height: 86px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 22px;
            background: rgba(168, 85, 247, 0.12);
            border: 1px solid rgba(168, 85, 247, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .brand p {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.65;
            margin-bottom: 28px;
        }

        .dots {
            display: flex;
            gap: 7px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .form-wrap {
            flex: 1;
            padding: 60px 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-wrap h3 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .form-wrap .sub {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 28px;
        }

        .feedback {
            display: none;
            padding: 13px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.45;
            margin-bottom: 18px;
        }

        .feedback.error {
            background: rgba(239, 68, 68, 0.09);
            border: 1px solid rgba(239, 68, 68, 0.28);
            color: #fca5a5;
        }

        .feedback.success {
            background: rgba(34, 197, 94, 0.09);
            border: 1px solid rgba(34, 197, 94, 0.28);
            color: #86efac;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 8px;
        }

        .field input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: #f9fafb;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .field input::placeholder {
            color: #374151;
        }

        .field input:focus {
            border-color: rgba(168, 85, 247, 0.65);
            background: rgba(168, 85, 247, 0.06);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.13);
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 6px;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.01em;
        }

        .btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #6d28d9 0%, #9333ea 100%);
            box-shadow: 0 0 28px rgba(168, 85, 247, 0.4);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .switch {
            margin-top: 22px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            font-size: 13px;
            color: #6b7280;
        }

        .switch a {
            color: #c084fc;
            font-weight: 600;
            text-decoration: none;
            margin-left: 4px;
        }

        .switch a:hover {
            color: #a855f7;
        }

        @media (max-width: 660px) {
            .card {
                flex-direction: column;
            }

            .brand {
                width: 100%;
                padding: 36px 28px 24px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .form-wrap {
                padding: 28px 24px;
            }
        }
    </style>
</head>

<body>
    <div class="card">

        <div class="brand">
            <div class="brand-logo">
                <img src="/skills.png" alt="Skills Seekers"
                    onerror="this.src='https://ui-avatars.com/api/?name=SS&background=7c3aed&color=fff&size=86&font-size=0.5'">
            </div>
            <h2>Join Skills Seekers<br>Resource Hub</h2>
            <p>Create a free account. Access PYQs, notes, crash courses &amp; more.</p>
            <div class="dots">
                <div class="dot" style="background:#6366f1"></div>
                <div class="dot" style="background:#a855f7"></div>
                <div class="dot" style="background:#fbbf24"></div>
            </div>
        </div>

        <div class="form-wrap">
            <h3>Create Account ✨</h3>
            <p class="sub">Free forever — no credit card needed</p>

            <div id="feedback" class="feedback"></div>

            <form id="signup-form">
                <div class="field">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe" autocomplete="name">
                </div>
                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="6" placeholder="Minimum 6 characters"
                        autocomplete="new-password">
                </div>
                <button type="submit" id="btn" class="btn">Create Account</button>
            </form>

            <div class="switch">
                Already have an account? <a href="/login">Sign in →</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPA_URL = 'https://bxgbijoqrhvnwzdchedr.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4Z2Jpam9xcmh2bnd6ZGNoZWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzQ1MjUsImV4cCI6MjA5MDgxMDUyNX0.vuxFdc6ps06v41YvpTe3igN8XgXpJsSoCh9zD3bdWiU';
        const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

        const form = document.getElementById('signup-form');
        const btn = document.getElementById('btn');
        const feedback = document.getElementById('feedback');

        function showMsg(text, type) {
            feedback.textContent = text;
            feedback.className = 'feedback ' + type;
            feedback.style.display = 'block';
        }

        supabase.auth.getSession().then(({ data }) => {
            if (data && data.session && data.session.user) {
                window.location.href = '/home';
            }
        });

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!name || !email || !password) {
                showMsg('Please fill in all fields.', 'error');
                return;
            }
            if (password.length < 6) {
                showMsg('Password must be at least 6 characters.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Creating account...';
            feedback.style.display = 'none';

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (data.success) {
                    if (data.session) {
                        sessionStorage.setItem('ss_user', JSON.stringify(data.user));
                        sessionStorage.setItem('ss_token', data.session.access_token);
                        showMsg('✓ Account created! Redirecting...', 'success');
                        setTimeout(() => { window.location.href = '/home'; }, 700);
                    } else {
                        showMsg('✓ Account created! Check your email inbox for a confirmation link, then come back to login.', 'success');
                        form.style.opacity = '0.4';
                        form.style.pointerEvents = 'none';
                        btn.innerHTML = 'Create Account';
                    }
                } else {
                    showMsg('Signup failed: ' + data.error, 'error');
                }
            } catch (err) {
                showMsg('Network error: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                if (btn.innerHTML !== 'Create Account') {
                    btn.innerHTML = 'Create Account';
                }
            }
        });
    </script>
</body>

</html>
