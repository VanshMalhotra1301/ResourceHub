<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Skills Seekers Resource Hub</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #050505;
            color: #e5e7eb;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 15% 50%, rgba(99, 102, 241, 0.10) 0%, transparent 100%),
                radial-gradient(ellipse 50% 40% at 85% 20%, rgba(168, 85, 247, 0.07) 0%, transparent 100%);
            pointer-events: none;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 880px;
            background: rgba(10, 10, 14, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 0 100px rgba(99, 102, 241, 0.14), 0 40px 80px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
        }

        /* ── Left brand panel ── */
        .brand {
            width: 42%;
            padding: 60px 44px;
            background: linear-gradient(160deg, rgba(18, 18, 28, 0.7) 0%, rgba(6, 6, 12, 0.95) 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 0;
        }

        .brand-logo {
            width: 86px;
            height: 86px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 22px;
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .brand p {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.65;
            margin-bottom: 28px;
        }

        .dots {
            display: flex;
            gap: 7px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        /* ── Right form panel ── */
        .form-wrap {
            flex: 1;
            padding: 60px 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-wrap h3 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .form-wrap .sub {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 28px;
        }

        /* ── Feedback box ── */
        .feedback {
            display: none;
            padding: 13px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.45;
            margin-bottom: 18px;
        }

        .feedback.error {
            background: rgba(239, 68, 68, 0.09);
            border: 1px solid rgba(239, 68, 68, 0.28);
            color: #fca5a5;
        }

        .feedback.success {
            background: rgba(34, 197, 94, 0.09);
            border: 1px solid rgba(34, 197, 94, 0.28);
            color: #86efac;
        }

        /* ── Fields ── */
        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 8px;
        }

        .field input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: #f9fafb;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .field input::placeholder {
            color: #374151;
        }

        .field input:focus {
            border-color: rgba(99, 102, 241, 0.65);
            background: rgba(99, 102, 241, 0.06);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.13);
        }

        /* ── Submit ── */
        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 6px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.01em;
        }

        .btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
            box-shadow: 0 0 28px rgba(79, 70, 229, 0.4);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Footer link ── */
        .switch {
            margin-top: 22px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            font-size: 13px;
            color: #6b7280;
        }

        .switch a {
            color: #818cf8;
            font-weight: 600;
            text-decoration: none;
            margin-left: 4px;
            transition: color 0.2s;
        }

        .switch a:hover {
            color: #a5b4fc;
        }

        @media (max-width: 660px) {
            .card {
                flex-direction: column;
            }

            .brand {
                width: 100%;
                padding: 36px 28px 24px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .form-wrap {
                padding: 28px 24px;
            }
        }
    </style>
</head>

<body>
    <div class="card">

        <!-- Brand -->
        <div class="brand">
            <div class="brand-logo">
                <img src="/skills.png" alt="Skills Seekers"
                    onerror="this.src='https://ui-avatars.com/api/?name=SS&background=4f46e5&color=fff&size=86&font-size=0.5'">
            </div>
            <h2>Skills Seekers<br>Resource Hub</h2>
            <p>BU's academic resource platform. Access PYQs, notes &amp; crash courses.</p>
            <div class="dots">
                <div class="dot" style="background:#6366f1"></div>
                <div class="dot" style="background:#a855f7"></div>
                <div class="dot" style="background:#fbbf24"></div>
            </div>
        </div>

        <!-- Form -->
        <div class="form-wrap">
            <h3>Welcome back 👋</h3>
            <p class="sub">Sign in to your Skills Seekers account</p>

            <div id="feedback" class="feedback"></div>

            <form id="login-form">
                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••"
                        autocomplete="current-password">
                </div>
                <button type="submit" id="btn" class="btn">Sign In</button>
            </form>

            <div class="switch">
                Don't have an account? <a href="/signup">Create one free →</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const btn = document.getElementById('btn');
        const feedback = document.getElementById('feedback');

        function showMsg(text, type) {
            feedback.textContent = text;
            feedback.className = 'feedback ' + type;
            feedback.style.display = 'block';
        }

        // If session exists in sessionStorage, redirect
        const storedUser = sessionStorage.getItem('ss_user');
        if (storedUser) {
            window.location.href = '/home';
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMsg('Please enter your email and password.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Signing in...';
            feedback.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success) {
                    // Store user info in sessionStorage for the home page
                    sessionStorage.setItem('ss_user', JSON.stringify(data.user));
                    sessionStorage.setItem('ss_token', data.session.access_token);

                    showMsg('✓ Logged in! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = '/home'; }, 600);
                } else {
                    showMsg('Login failed: ' + data.error, 'error');
                }
            } catch (err) {
                showMsg('Network error — is the server running? (' + err.message + ')', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
